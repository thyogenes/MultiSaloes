<!DOCTYPE html>
<html>
<head> <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Montserrat:wght@400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendamento</title>

<link rel="stylesheet" href="/css/style.css">
<link rel="manifest" href="/manifest.json">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script src="firebase.js"></script>
<script src="utils.js"></script>
<script src="tenant.js"></script>
<script src="booking.js"></script>
</head>

<body>

<header id="salonHeader">
  <img id="salonLogo" style="max-height:80px;display:none;">
  <h1 id="salonName">Carregando...</h1>
</header>

<div id="bannerContainer"></div>
<div id="aboutSection" class="card"></div>
<div id="addressSection" class="card"></div>
<div id="instagramSection" class="card"></div>
<div class="container">

<div class="card">
<h2>Escolha o Serviço</h2>
<select id="service">
<option value="110">Alongamento natural esmaltada - R$110</option>
<option value="110">BabyBommer Acrílico (Quadrada) - R$110</option>
<option value="110">Babycollor Acrílico (Quadrada) - R$110</option>
<option value="110">Babyglitter Acrílico (Quadrada) - R$110</option>
<option value="100">Banho de acrílico + esmaltação - R$100</option>
<option value="10">Filha única Encapsulada (Par) - R$10</option>
<option value="10">Formatos (Bailarina, Stilleto, Almond) - R$10</option>
<option value="100">Francesa reversa no banho de acrílico - R$100</option>
<option value="130">Francesa reversa (Quadrada) - R$130</option>
<option value="80">Manutenções - R$80</option>
<option value="120">Mix Artes diferentes - R$120</option>
<option value="90">Natural Acrílico (Quadrada) - R$90</option>
<option value="50">Pedicure com esmaltação em gel - R$50</option>
<option value="25">Remoção - R$25</option>
<option value="50">Blindagem (Esmaltação gel natural) - R$50</option>
</select>
</div>

<div class="card">
<h2>Data</h2>
<input type="date" id="date">
</div>

<div class="card">
<h2>Horário</h2>
<select id="time">
<option>09:00</option>
<option>10:00</option>
<option>11:00</option>
<option>13:00</option>
<option>14:00</option>
<option>15:00</option>
<option>16:00</option>
<option>17:00</option>
</select>
</div>

<div class="card">
<input type="text" id="name" placeholder="Seu nome">
<input type="tel" id="phone" placeholder="WhatsApp">
<button onclick="book()">Confirmar Agendamento</button>
</div>

<h2>Galeria</h2>
<div id="gallery" class="gallery"></div>

</div>

<script>
loadSalon().then(() => {
if(currentSalon){
document.getElementById("salonName").innerText = currentSalon.name;
loadGallery();
}
});
</script>

<script>
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>
